function renderLevel(arr,parent,depth,prefix){
  const grp=document.createElement('div');grp.className='bgrp';
  arr.forEach((b,i)=>{mkB(b);
    const myNum=prefix?(prefix+(i+1)):''+(i+1);
    const row=document.createElement('div');row.className='brow';if(b.desc||b.children.length)row.classList.add('hd');
    row.draggable=true;row.dataset.idx=i;

    // Drag events
    row.addEventListener('dragstart',e=>{e.stopPropagation();dragSrc=b;dragArr=arr;dragIdx=i;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','')});
    row.addEventListener('dragend',e=>{row.classList.remove('dragging');document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(el=>el.classList.remove('drag-over-top','drag-over-bot'))});
    row.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();e.dataTransfer.dropEffect='move';
      if(dragSrc===b)return;
      const rect=row.getBoundingClientRect();const midY=rect.top+rect.height/2;
      row.classList.toggle('drag-over-top',e.clientY<midY);
      row.classList.toggle('drag-over-bot',e.clientY>=midY)});
    row.addEventListener('dragleave',()=>{row.classList.remove('drag-over-top','drag-over-bot')});
    row.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();row.classList.remove('drag-over-top','drag-over-bot');
      if(!dragSrc||dragSrc===b)return;
      // Remove from source array
      const srcIdx=dragArr.indexOf(dragSrc);if(srcIdx>-1)dragArr.splice(srcIdx,1);
      // Insert into target array
      const rect=row.getBoundingClientRect();const midY=rect.top+rect.height/2;
      let tgtIdx=arr.indexOf(b);
      if(e.clientY>=midY)tgtIdx++;
      // If dragArr was same arr and removed before target, adjust
      if(dragArr===arr&&srcIdx<tgtIdx)tgtIdx=Math.max(0,tgtIdx);
      arr.splice(tgtIdx,0,dragSrc);
      dragSrc=null;dragArr=null;dragIdx=-1;
      rB(n,bd);ds()});

    // Drag handle
    const drag=document.createElement('div');drag.className='bdrag';drag.textContent='⠿';drag.title='ลากเพื่อเรียงลำดับ';
    drag.addEventListener('mousedown',e=>e.stopPropagation());

    // Number label
    const num=document.createElement('div');num.className='bnum';num.textContent=myNum;

      if(e.key==='Tab'&&!e.shiftKey&&i>0){e.preventDefault();const prev=arr[i-1];mkB(prev);prev.children.push(b);arr.splice(i,1);prev._open=true;rB(n,bd);ds()}
      if(e.key==='Backspace'&&!inp.value&&arr.length>1){e.preventDefault();arr.splice(i,1);rB(n,bd);ds()}});
    const addChild=document.createElement('div');addChild.className='bex';addChild.textContent='+';addChild.title='เพิ่มหมวดย่อย';
    addChild.addEventListener('click',e=>{e.stopPropagation();mkB(b);b.children.push({text:'',desc:'',children:[],status:''});b._open=true;rB(n,bd);ds()});
